<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منزلق المنتجات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="CCS/product-slider.css">
</head>
<body>
    <div class="slider-container">
        <div class="slider-wrapper">
            <div class="slider" id="productSlider">
                <!-- المنتجات سيتم إدراجها هنا -->
            </div>
        </div>
        
        <!-- أزرار التنقل -->
        <button class="slider-btn prev-btn" id="prevBtn">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="slider-btn next-btn" id="nextBtn">
            <i class="fas fa-chevron-right"></i>
        </button>
        
        <!-- مؤشرات -->
        <div class="slider-indicators" id="indicators"></div>
    </div>

    <script src="JS/product-slider.js"></script>
</body>
</html>
